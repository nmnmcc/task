name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-launcher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: syntax-check launcher and scripts
        run: |
          node --check packages/task/bin/task.js
          node --check scripts/sync.js
          node --check scripts/generate.js
      - name: ensure packages/ matches generate.js output
        run: |
          set -euo pipefail
          node scripts/generate.js
          if ! git diff --quiet -- packages; then
            echo "::error::packages/ is out of sync with scripts/generate.js — run 'npm run generate' and commit the result."
            git --no-pager diff -- packages
            exit 1
          fi

  dry-run-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: dry-run build (no publish)
        env:
          GH_TOKEN: ${{ github.token }}
          DRY_RUN: "true"
          FORCE: "true"   # let the build run even if the latest is already published
        run: npm ci && npm run sync
      - name: list dist
        run: |
          set -euo pipefail
          ls -la dist/
          for d in dist/*/; do
            echo "--- $d ---"
            cat "$d/package.json"
          done
