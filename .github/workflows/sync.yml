name: sync upstream

on:
  schedule:
    # daily at 03:17 UTC (off-peak; avoids the busy top-of-hour cron tier)
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Upstream version to mirror (e.g. 3.50.0). Empty = latest."
        required: false
        default: ""
      force:
        description: "Republish even if version already exists on npm"
        type: boolean
        default: false
      dry_run:
        description: "Build but skip npm publish"
        type: boolean
        default: false

permissions:
  contents: write # for tagging the mirror commit
  id-token: write # required by `npm publish --provenance`

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: ensure npm CLI >= 11.5.1 (required by npm Trusted Publishing)
        run: npm install -g npm@latest

      - name: sync
        id: sync
        env:
          # Trusted Publishing: auth happens via GitHub OIDC (id-token: write).
          # Each @nmnmcc/* package must be onboarded individually at
          # npmjs.com/package/<name>/access — workflow filename "sync.yml" and
          # repo "NMNMCC/task" must match exactly. Do NOT set NODE_AUTH_TOKEN
          # or NPM_TOKEN; they conflict with OIDC and silently fall back to
          # token auth.
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          FORCE: ${{ inputs.force }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: npm ci && npm run sync

      - name: tag mirror commit
        if: steps.sync.outputs.skip == 'false' && inputs.dry_run != true
        env:
          # VERSION comes from our own script (stdout -> outputs.version), and
          # has already been regex-validated as semver inside scripts/sync.js.
          VERSION: ${{ steps.sync.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "tag v${VERSION} already exists, skipping"
          else
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
          fi
